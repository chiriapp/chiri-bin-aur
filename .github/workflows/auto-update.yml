name: Auto Update AUR

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Get latest release version
        id: latest_release
        run: |
          LATEST_TAG=$(curl -sL https://api.github.com/repos/chiriapp/chiri/releases/latest | jq -r ".tag_name")
          VERSION=${LATEST_TAG#app-v}
          VERSION=${VERSION#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Get current version
        id: current_version
        run: |
          CURRENT=$(grep -E "^pkgver=" PKGBUILD | cut -d= -f2 | tr -d '"')
          echo "version=${CURRENT}" >> $GITHUB_OUTPUT

      - name: Run update script
        if: steps.latest_release.outputs.version != steps.current_version.outputs.version
        run: |
          python3 update.py ${{ steps.latest_release.outputs.version }}

      - name: Commit and push to GitHub repository
        if: steps.latest_release.outputs.version != steps.current_version.outputs.version
        env:
          VERSION: ${{ steps.latest_release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "chore: update to v${VERSION}" || exit 0
          git push

      - name: Push to AUR
        if: steps.latest_release.outputs.version != steps.current_version.outputs.version
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          VERSION: ${{ steps.latest_release.outputs.version }}
        run: |
          if [ -z "$AUR_SSH_PRIVATE_KEY" ]; then
            echo "Skipping AUR push: AUR_SSH_PRIVATE_KEY secret is not set."
            exit 0
          fi
          mkdir -p ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur"
          
          git clone ssh://aur@aur.archlinux.org/chiri-bin.git aur-repo
          cd aur-repo
          cp ../PKGBUILD ../.SRCINFO ../chiri.desktop ../chiri-bin.install .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO chiri.desktop chiri-bin.install
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "chore: update to v$VERSION"
            git push
          fi
