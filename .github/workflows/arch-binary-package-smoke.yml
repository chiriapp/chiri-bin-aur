name: Arch binary package smoke test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: arch-binary-package-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build and inspect chiri-bin
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    container:
      image: archlinux:base
    defaults:
      run:
        shell: bash

    steps:
      - name: Prepare Arch container
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm --needed git sudo namcap desktop-file-utils binutils tar

      - name: Checkout
        uses: actions/checkout@v4

      - name: Get package version
        id: pkgver
        run: |
          PKGVER=$(grep -E "^pkgver=" PKGBUILD | cut -d= -f2 | tr -d '"')
          echo "version=${PKGVER}" >> $GITHUB_OUTPUT

      - name: Download binary package
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            URL="https://github.com/chiriapp/chiri/releases/download/app-v${{ steps.pkgver.outputs.version }}/Chiri_${{ steps.pkgver.outputs.version }}_amd64.deb"
          else
            URL="https://github.com/chiriapp/chiri/releases/download/app-v${{ steps.pkgver.outputs.version }}/Chiri_${{ steps.pkgver.outputs.version }}_arm64.deb"
          fi

          curl -L -o chiri.deb "$URL"
          test -f chiri.deb

      - name: Extract and verify deb
        run: |
          mkdir -p deb-extract
          cd deb-extract
          bsdtar -xf ../chiri.deb data.tar.gz
          bsdtar -xf data.tar.gz

          test -x usr/bin/Chiri
          test -f usr/share/applications/Chiri.desktop
          test -f usr/share/icons/hicolor/128x128/apps/Chiri.png

      - name: Verify desktop file
        run: |
          pacman -S --noconfirm desktop-file-utils
          desktop-file-validate deb-extract/usr/share/applications/Chiri.desktop

      - name: Check dependencies
        if: matrix.arch == 'x86_64'
        run: |
          # Install runtime deps so ldd can resolve all shared libraries
          pacman -S --noconfirm --needed \
            cairo gdk-pixbuf2 glib2 gtk3 libsoup3 pango webkit2gtk-4.1
          ldd deb-extract/usr/bin/Chiri | tee /tmp/chiri-ldd.txt
          ! grep -q "not found" /tmp/chiri-ldd.txt
